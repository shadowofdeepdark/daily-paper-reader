  - tag: 心理语言
    description: 我研究心理语言学，关注人们理解讽刺与反语等非字面语言的机制，探讨在口语与书面语中的多模态和排版线索（如大小写、标点、表情符号）、语音语调及语用加工的作用。我采用眼动追踪和自定步阅读方法，同时对脑电等手段感兴趣，也广泛涉及实验语用学、比喻语言加工、内在言语、语言预测及双语语言加工。
